name: Periodic Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check health of deployed app
        uses: jtalk/url-health-check-action@v4
        with:
          url: https://simple-notes-cicd.onrender.com/health
          max-attempts: 3
          retry-delay: 5s